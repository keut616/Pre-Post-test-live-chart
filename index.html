        let firebaseConfig = null;

          ),

        };

        const surveyStructure = [
          {
            id: 'general_information',
            title: 'I. ຂໍ້ມູນທົ່ວໄປ',

              { name: '_101_1', type: 'select_one', label: '101.1. ກະລຸນາເລຶອກເພດຂອງທ່ານ', choices: 'gender', required: true },

              { name: '_104', type: 'select_one', label: '104. ເມືອງ', choices: 'district', required: true, choice_filter: (data) => data._103 },

          {

            title: 'II. ການສຸມໃສ່',

            questions: [
              { name: 'focus1', type: 'select_one', label: '1. ເຈົ້າຄວນໃຊ້ເວລາສ່ວນໃຫ່ຍ ໃນການເຮັດວຽກທີ່:', choices: 'focus1_opts', required: true },
              { name: 'focus2', type: 'select_one', label: '2. ສັດສ່ວນເວລາຂອງທ່ານທີ່ຄວນໃຊ້ໃນວຽກທີ່ “ສຳຄັນ ແລະ ບໍ່ຮີບດ່ວນ” ແມ່ນເທົ່າໃດ?', choices: 'focus2_opts', required: true },

              { name: 'align2', type: 'select_one', label: '5. ເຮົາເອີ້ນສະມາຊິກໃນທີມຜູ້ທີ່ມັກເບິ່ງກິດຈະກຳ ແລະ ຕ້ອງໄດ້ປຸກລະດົມໃນການມີສ່ວນຮ່ວມ?', choices: 'alignb', required: true },
              { name: 'align3', type: 'select_one', label: '6. ລຸ່ມນີ້ມີອັນໃດແດ່ທີ່ເປັນທັກສະການອໍານວຍຄວາມສະດວກທີ່ດີ?', choices: 'alignc', required: true }
            ]
          },
          {
            id: 'inspire',
            title: 'IV. ການສ້າງແຮງບັນດານໃຈ',
            icon: <Icon.Lightbulb />,
            questions: [
              { name: 'inspire1', type: 'select_one', label: '7. ການປະຕິບັດກ່ຽວກັບການບໍລິຫານທີ່ສໍາຄັນອັນໃດ ທີ່ຈະເພີ່ມຄວາມໄວ້ວາງໃຈ?', choices: 'inspirea', required: true },
              { name: 'inspire2', type: 'select_one', label: '8. ການສ້າງຄວາມໄວ້ວາງໃຈແມ່ນສໍາຄັນ ສໍາຫຼັບ?', choices: 'inspireb', required: true },
              { name: 'inspire3', type: 'select_one', label: '9. ເຕັກນິກການສື່ສານທີ່ດີແມ່ນຫຍັງ?', choices: 'inspirec', required: true }
            ]
          },
          {
            id: 'governance',
            title: 'V. ການຄຸ້ມຄອງ – ຄວາມຮັບຜິດຊອບ',
            icon: <Icon.ShieldCheck />,
            questions: [
              { name: 'gov1', type: 'select_one', label: '10. ອັນໃດເປັນວິທີການເກັບກຳຄໍາຄິດເຫັນຈາກລູກຄ້າ?', choices: 'gov1', required: true }
            ]
          }
        ];

        // ==========================================
        // COLUMN CHART COMPONENT
        // ==========================================
        const ColumnChart = ({ data, maxScore, isFullscreen }) => {
          const yAxisTicks = Array.from({ length: maxScore + 1 }, (_, i) => maxScore - i);

          if (!data || data.length === 0) {
            return <div className={`flex items-center justify-center text-gray-400 ${isFullscreen ? 'h-[50vh]' : 'h-64'}`}>ຍັງບໍ່ມີຂໍ້ມູນການປະເມີນ (No data yet)</div>;
          }

          return (
            <div className={`relative w-full pt-10 pb-14 pl-8 pr-4 transition-all duration-300 ${isFullscreen ? 'h-[55vh]' : 'h-[350px]'}`}>
              <div className="absolute left-0 top-10 bottom-14 w-8 flex flex-col justify-between text-xs text-gray-400 text-right pr-2">
                {yAxisTicks.map(tick => (
                  <div key={`tick-${tick}`} className="h-0 flex items-center justify-end">{tick}</div>
                ))}
              </div>
              <div className="relative w-full h-full border-b-2 border-l-2 border-gray-300 flex items-end overflow-x-auto gap-5 px-2 scrollbar-thin scrollbar-thumb-gray-300">
                <div className="absolute inset-0 flex flex-col justify-between pointer-events-none z-0">
                  {yAxisTicks.map(tick => (
                    <div key={`line-${tick}`} className="w-full h-px bg-gray-100"></div>
                ))}
              </div>
              {data.map((item, index) => {
                if (!item) return null;
                const scoreValue = typeof item.score === 'number' ? item.score : 0;
                const heightPercentage = (scoreValue / (maxScore || 10)) * 100;
                const isPre = item.assessment_time === 'pre';
                return (
                  <div key={item.id || index} className="relative flex flex-col items-center justify-end h-full z-10 group" style={{ minWidth: isFullscreen ? '60px' : '45px' }}>
                    <span className={`font-bold text-gray-700 mb-1 transition-all duration-700 ${isFullscreen ? 'text-base' : 'text-sm'}`}>
                      {scoreValue}
                    </span>
                    <div 
                      className={`rounded-t-sm transition-all duration-700 ease-out shadow-sm hover:shadow-md cursor-pointer hover:opacity-85 ${isFullscreen ? 'w-14' : 'w-10'}`}
                      style={{ height: `${heightPercentage}%`, backgroundColor: isPre ? '#35675D' : '#BF5A38' }}
                    ></div>
                    <div className={`absolute -bottom-10 text-center -rotate-45 transform origin-top left-1/2 -translate-x-1/2 font-bold text-gray-700 truncate ${isFullscreen ? 'w-24 text-xs' : 'w-20 text-[11px]'}`}>
                      {item._101 || '-'}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // ==========================================
      // QUESTION STATS CHART COMPONENT (HORIZONTAL GROUPED BARS)
      // ==========================================
      const QuestionChart = ({ data, correctAnswers, surveyStructure, isFullscreen }) => {
        if (!data || data.length === 0) {
          return <div className={`flex items-center justify-center text-gray-400 ${isFullscreen ? 'h-[50vh]' : 'h-64'}`}>ຍັງບໍ່ມີຂໍ້ມູນການປະເມີນ (No data yet)</div>;
        }

        // ສ້າງລາຍຊື່ຄຳຖາມທີ່ມີສະເຫຼີຍ ເພື່ອນຳມາສະແດງເປັນແກນ Y
        const questions = [];
        surveyStructure.forEach(section => {
          section.questions.forEach(q => {
            if (correctAnswers[q.name]) {
              questions.push({ name: q.name, label: q.label });
            }
          });
        });

        // ແຍກຂໍ້ມູນກ່ອນ ແລະ ຫຼັງ
        const preData = data.filter(d => d.assessment_time === 'pre');
        const postData = data.filter(d => d.assessment_time === 'post');

        // ຄິດໄລ່ຈຳນວນຄົນຕອບຖືກແຕ່ລະຂໍ້
        const stats = questions.map((q) => {
          const preCorrect = preData.filter(d => d[q.name] === correctAnswers[q.name]).length;
          const postCorrect = postData.filter(d => d[q.name] === correctAnswers[q.name]).length;
          return {
            id: q.name,
            label: q.label,
            preCount: preCorrect,
            postCount: postCorrect
          };
        });

        // ຫາຄ່າສູງສຸດເພື່ອເປັນເກນຄວາມຍາວຂອງແຖບກຣາຟ (100% width)
        const maxCount = Math.max(...stats.map(s => Math.max(s.preCount, s.postCount)), 1);

        return (
          <div className={`w-full flex flex-col gap-4 transition-all duration-300 ${isFullscreen ? 'h-[65vh] overflow-y-auto' : 'max-h-[500px] overflow-y-auto'} pr-2 py-4`}>
            {stats.map((item) => {
              const preWidth = (item.preCount / maxCount) * 100;
              const postWidth = (item.postCount / maxCount) * 100;
              
              return (
                <div key={item.id} className="flex items-center w-full gap-3">
                  {/* ຫົວຂໍ້ຄຳຖາມ (ເບື້ອງຊ້າຍ) */}
                  <div className="w-1/3 text-xs text-gray-700 text-right leading-relaxed line-clamp-3" title={item.label}>
                    {item.label}
                  </div>
                  
                  {/* ແຖບກຣາຟ (ເບື້ອງຂວາ) */}
                  <div className="w-2/3 flex flex-col gap-1.5 border-l-2 border-gray-300 pl-3 py-1">
                    {/* ແຖບ Pre-test (ສີຂຽວ) */}
                    <div className="flex items-center gap-2">
                      <div 
                        className="h-4 bg-[#35675D] transition-all duration-700 ease-out rounded-r-sm" 
                        style={{ width: `${preWidth}%`, minWidth: item.preCount > 0 ? '4px' : '0' }}
                      ></div>
                      <span className="text-[11px] text-gray-600 font-bold">{item.preCount}</span>
                    </div>
                    
                    {/* ແຖບ Post-test (ສີສົ້ມ) */}
                    <div className="flex items-center gap-2">
                      <div 
                        className="h-4 bg-[#BF5A38] transition-all duration-700 ease-out rounded-r-sm" 
                        style={{ width: `${postWidth}%`, minWidth: item.postCount > 0 ? '4px' : '0' }}
                      ></div>
                      <span className="text-[11px] text-gray-600 font-bold">{item.postCount}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      // ==========================================
      // BOTTOM 3 QUESTIONS COMPONENT
      // ==========================================
      const BottomThreeChart = ({ data, correctAnswers, surveyStructure }) => {
        if (!data || data.length === 0) return <div className="text-center text-gray-400 py-4">ຍັງບໍ່ມີຂໍ້ມູນ</div>;

        const stats = Object.keys(correctAnswers).map(key => {
          let total = data.length;
          let correct = data.filter(d => d[key] === correctAnswers[key]).length;
          let percentage = total > 0 ? Math.round((correct / total) * 100) : 0;
          
          let label = key;
          surveyStructure.forEach(sec => {
            const q = sec.questions.find(q => q.name === key);
            if (q) label = q.label;
          });

          return { id: key, label, percentage };
        });

        // ຈັດລຽງເປີເຊັນຕອບຖືກຈາກໜ້ອຍໄປຫາຫຼາຍ ແລ້ວຕັດເອົາແຕ່ 3 ອັນດັບທຳອິດ
        stats.sort((a, b) => a.percentage - b.percentage);
        const bottom3 = stats.slice(0, 3);

        return (
          <div className="flex flex-col gap-3 mt-2 p-2">
            {bottom3.map((item, idx) => (
              <div key={item.id} className="flex items-center gap-4 p-4 bg-red-50/50 rounded-xl border border-red-100 transition-all hover:bg-red-50">
                <div className="w-10 h-10 rounded-full bg-white text-red-600 flex items-center justify-center font-bold text-lg shrink-0 shadow-sm border border-red-200">
                  {idx + 1}
                </div>
                <div className="flex-1 text-sm md:text-base text-gray-800 leading-relaxed line-clamp-2" title={item.label}>
                  {item.label}
                </div>
                <div className="w-24 md:w-32 flex flex-col gap-1.5 shrink-0">
                  <div className="flex justify-between items-center text-xs">
                    <span className="text-gray-500 font-medium">ຕອບຖືກ</span>
                    <span className="font-bold text-red-600">{item.percentage}%</span>
                  </div>
                  <div className="w-full h-2.5 bg-gray-200 rounded-full overflow-hidden">
                    <div className="h-full bg-red-500 rounded-full transition-all duration-1000" style={{ width: `${item.percentage}%` }}></div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      };

      // ==========================================
      // AI CHAT COMPONENT (ກ່ອງແຊັດ AI)
      // ==========================================
      const AIChatBox = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [messages, setMessages] = useState([{ role: 'model', text: 'ສະບາຍດີ! ຂ້ອຍຄືຜູ້ຊ່ວຍ AI ຂອງລະບົບ LMG. ທ່ານມີຫຍັງໃຫ້ຂ້ອຍຊ່ວຍບໍ່?' }]);
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);

        const sendMessage = async () => {
          if (!input.trim() || isLoading) return;
          const userMsg = input.trim();
          setInput('');
          setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
          setIsLoading(true);

          try {
             const apiKey = ""; // API Key ຈະຖືກສະໜອງໃຫ້ໂດຍລະບົບແວດລ້ອມອັດຕະໂນມັດ
             const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
             
             let response;
             let retries = 0;
             const delays = [1000, 2000, 4000, 8000, 16000];
             
             while (retries <= 5) {
               try {
                 response = await fetch(url, {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({
                     contents: [{ parts: [{ text: userMsg }] }],
                     systemInstruction: { parts: [{ text: "ເຈົ້າເປັນຜູ້ຊ່ວຍ AI ສຳລັບລະບົບປະເມີນຜົນ LMG ຕອບເປັນພາສາລາວສະເໝີ ແລະ ສຸພາບ. ຕອບໃຫ້ສັ້ນກະທັດຮັດເຂົ້າໃຈງ່າຍ." }] }
                   })
                 });
                 if (response.ok) break;
                 if (retries === 5) throw new Error("Max retries reached");
                 await new Promise(r => setTimeout(r, delays[retries]));
                 retries++;
               } catch (e) {
                 if (retries === 5) throw e;
                 await new Promise(r => setTimeout(r, delays[retries]));
                 retries++;
               }
             }
             
             const data = await response.json();
             const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "ຂໍອະໄພ, ເກີດຂໍ້ຜິດພາດໃນການປະມວນຜົນ.";
             setMessages(prev => [...prev, { role: 'model', text: aiText }]);
          } catch (error) {
             setMessages(prev => [...prev, { role: 'model', text: "ຂໍອະໄພ, ບໍ່ສາມາດເຊື່ອມຕໍ່ກັບ AI ໄດ້ໃນເວລານີ້. ກະລຸນາກວດສອບອິນເຕີເນັດຂອງທ່ານ." }]);
          } finally {
             setIsLoading(false);
          }
        };

        return (
          <div className="fixed bottom-4 right-4 z-[999] font-noto">
            {isOpen ? (
              <div className="bg-white w-80 md:w-96 rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden transition-all duration-300 animate-in slide-in-from-bottom-4">
                <div className="bg-blue-600 text-white p-3 flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <Icon.MessageCircle className="w-5 h-5" />
                    <span className="font-bold text-sm">ຜູ້ຊ່ວຍ AI LMG</span>
                  </div>
                  <button onClick={() => setIsOpen(false)} className="hover:bg-blue-700 p-1 rounded transition-colors">
                    <Icon.X className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="h-80 overflow-y-auto p-4 flex flex-col gap-3 bg-gray-50">
                  {messages.map((msg, idx) => (
                    <div key={idx} className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'self-end items-end' : 'self-start items-start'}`}>
                      <div className={`p-3 rounded-2xl ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-bl-sm shadow-sm'}`}>
                        <p className="text-sm whitespace-pre-wrap leading-relaxed">{msg.text}</p>
                      </div>
                    </div>
                  ))}
                  {isLoading && (
                    <div className="self-start bg-white border border-gray-200 p-3 rounded-2xl rounded-bl-sm shadow-sm">
                      <div className="flex gap-1.5 items-center h-4">
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: "0.2s"}}></div>
                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: "0.4s"}}></div>
                      </div>
                    </div>
                  )}
                </div>
                
                <div className="p-3 bg-white border-t border-gray-200 flex gap-2">
                  <input 
                    type="text" 
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
                    placeholder="ພິມຂໍ້ຄວາມຖາມ AI ຢູ່ທີ່ນີ້..."
                    className="flex-1 px-3 py-2 bg-gray-100 border border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                    disabled={isLoading}
                  />
                  <button 
                    onClick={sendMessage}
                    disabled={!input.trim() || isLoading}
                    className="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors flex items-center justify-center"
                  >
                    <Icon.Send className="w-5 h-5" />
                  </button>
                </div>
              </div>
            ) : (
              <button 
                onClick={() => setIsOpen(true)}
                className="bg-blue-600 text-white p-4 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:bg-blue-700 hover:scale-105 hover:-translate-y-1 transition-all flex items-center justify-center group"
                title="ສອບຖາມຜູ້ຊ່ວຍ AI"
              >
                <Icon.MessageCircle className="w-6 h-6" />
              </button>
            )}
          </div>
        );
      };

      // ==========================================
      // MAIN APPLICATION COMPONENT (USING LOCALSTORAGE PERSISTENCE)
      // ==========================================
      function App() {
        const [user, setUser] = useState({ uid: 'local-user', isAnonymous: true });
          const [isAdmin, setIsAdmin] = useState(false); 
          const [isChartFullscreen, setIsChartFullscreen] = useState(false);
          const [isCloudMode, setIsCloudMode] = useState(false);
          
          const [showAdminLogin, setShowAdminLogin] = useState(false);
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [adminLoginError, setAdminLoginError] = useState('');

          const [showNewFormModal, setShowNewFormModal] = useState(false);
          const [newFormText, setNewFormText] = useState('');
          const [newFormCopied, setNewFormCopied] = useState(false);
          
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          
          const [formData, setFormData] = useState({});
          const [errors, setErrors] = useState({});
          const [submitErrorMsg, setSubmitErrorMsg] = useState(''); 
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [showResultForm, setShowResultForm] = useState(false); 
          const [recentScore, setRecentScore] = useState(null);
          
          const [editId, setEditId] = useState(null);
          const [chartFilter, setChartFilter] = useState('all'); 
          const [selectedSubmission, setSelectedSubmission] = useState(null);
          
          // State ສໍາລັບເປີດ/ປິດ Dropdown ສົ່ງອອກຂໍ້ມູນ
          const [showExportDropdown, setShowExportDropdown] = useState(false);

          // ໂຫຼດຂໍ້ມູນຈາກ LocalStorage ເປັນຄ່າເລີ່ມຕົ້ນ (ພ້ອມທັງກວດສອບຄວາມປອດໄພ)
          const [submissions, setSubmissions] = useState(() => {
            const localData = localStorage.getItem('lmg_submissions_data');
            if (localData) {
              try {
                const parsed = JSON.parse(localData);
                if (Array.isArray(parsed)) {
                  // ກັ່ນຕອງເອົາສະເພາະ Object ທີ່ມີຄວາມສົມບູນເທົ່ານັ້ນ
                  return parsed.filter(item => item && typeof item === 'object');
                }
              } catch (e) {
                console.error("Error parsing local storage data", e);
              }
            }
            // ຂໍ້ມູນທົດລອງເລີ່ມຕົ້ນ (Default Mock Data)
            return [
              { id: 'demo-1', _101: 'LMG-001', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'ພະແນກສາທາແຂວງ', assessment_time: 'pre', score: 4, maxScore: 10, timestamp: Date.now() - 3600000 },
              { id: 'demo-2', _101: 'LMG-001', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'ພະແນກສາທາແຂວງ', assessment_time: 'post', score: 8, maxScore: 10, timestamp: Date.now() }
            ];
          });

          // ບັນທຶກຂໍ້ມູນລົງ LocalStorage ຖ້າບໍ່ໄດ້ໃຊ້ Cloud Mode
          useEffect(() => {
            if (!isCloudMode && Array.isArray(submissions)) {
              localStorage.setItem('lmg_submissions_data', JSON.stringify(submissions));
            }
          }, [submissions, isCloudMode]);

          // ການຈັດການລະບົບ Auth (Firebase ຫາກມີການຕັ້ງຄ່າ)
          useEffect(() => {
            const initAuth = async () => {
              if (!isFirebaseConfigured || !auth) {
                setUser({ uid: 'local-user', isAnonymous: true });
                setIsCloudMode(false);
                return;
              }
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  await auth.signInAnonymously();
                }
              } catch (error) {
                console.error("Auth error:", error);
                // Fallback to local mode if auth fails
                setIsCloudMode(false);
              }
            };
            initAuth();
            
            if (auth && isFirebaseConfigured) {
                const unsubscribe = auth.onAuthStateChanged(currentUser => {
                    if(currentUser) {
                        setUser(currentUser);
                        setIsCloudMode(true);
                    } else {
                        setIsCloudMode(false);
                    }
                });
                return () => unsubscribe();
            }
          }, []);

          // ໂຫຼດຂໍ້ມູນ (ຈາກ LocalStorage ຫາກບໍ່ມີ Firebase, ຈາກ Firestore ຫາກມີ Firebase)
          useEffect(() => {
            if (!user || !isAdmin) return;

            // ກໍລະນີມີ Firebase: ຊິງຄ໌ຂໍ້ມູນສົດໆຈາກ Cloud Firestore
            if (isCloudMode && db) {
                try {
                    const submissionsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');
                    const unsubscribe = submissionsRef.onSnapshot((snapshot) => {
                        // ຫາກເຊື່ອມຕໍ່ສຳເລັດ ແລະ ໄດ້ຮັບຂໍ້ມູນ, ຮັບປະກັນວ່າຢູ່ໃນໂໝດຄລາວ
                        setIsCloudMode(true);
                        
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => {
                          const timeA = a.timestamp ? (typeof a.timestamp.toMillis === 'function' ? a.timestamp.toMillis() : a.timestamp) : 0;
                          const timeB = b.timestamp ? (typeof b.timestamp.toMillis === 'function' ? b.timestamp.toMillis() : b.timestamp.timestamp) : 0;
                          return timeA - timeB; 
                        });
                        setSubmissions(data);
                      },
                      (error) => {
                          console.error("Firestore Fetching Error:", error);
                          // ຖ້າດຶງຂໍ້ມູນ Cloud ບໍ່ໄດ້ຍ້ອນ Permission Denied ຫຼື ການເຊື່ອມຕໍ່, ໃຫ້ສະລັບກັບມາໃຊ້ LocalStorage ອັດຕະໂນມັດ
                          console.warn("Falling back to LocalStorage due to Cloud DB error.");
                          setIsCloudMode(false);
                      }
                    );
                    return () => unsubscribe();
                } catch (err) {
                    console.error("Error setting up Firestore listener:", err);
                    setIsCloudMode(false);
                }
            }
          }, [user, isAdmin, isCloudMode]);

          const maxTotalScore = Object.keys(correctAnswers).length;

          const handleAdminToggleClick = () => {
            if (isAdmin) {
              setIsAdmin(false); 
              setIsChartFullscreen(false);
              cancelEdit(); 
            } else {
              setAdminPasswordInput('');
              setAdminLoginError('');
              setShowAdminLogin(true); 
            }
          };

          const handleAdminSubmit = () => {
            if (adminPasswordInput === 'admin') {
              setIsAdmin(true);
              setShowAdminLogin(false);
            } else {
              setAdminLoginError('ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ! (Incorrect Password)');
            }
          };

          const handleGenerateNewForm = () => {
            const promptText = `ຊ່ວຍສ້າງແອັບປະເມີນຜົນໃໝ່ໃຫ້ຂ້ອຍແດ່ ໂດຍໃຊ້ໂຄງສ້າງ ແລະ UI ແບບດຽວກັນກັບແອັບປັດຈຸບັນ (ມີ 2 ໜ້າຈໍ ຊ້າຍ-ວາ, ມີລະບົບ Admin, ມີກຣາຟ Real-time), ແຕ່ປ່ຽນຂໍ້ມູນແບບສອບຖາມໃໝ່ຕາມນີ້:\n\n${newFormText}`;

            const textArea = document.createElement("textarea");
            textArea.value = promptText;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setNewFormCopied(true);
              setTimeout(() => {
                setNewFormCopied(false);
                setShowNewFormModal(false);
                setNewFormText('');
              }, 15000); 
            } catch (err) {
              console.error('Copy failed', err);
              alert("ຂໍອະໄພ, ການກັອບປີ້ລົ້ມເຫຼວ. ກະລຸນາກະລຸນາກັອບປີ້ດ້ວຍຕົນເອງແລ້ວນຳໄປວາງໃນຊ່ອງແຊັດ.");
            }
            document.body.removeChild(textArea);
          };

          const handleEditClick = (sub) => {
            if (!sub) return;
            setFormData(sub); 
            setEditId(sub.id); 
            setShowResultForm(false);
            setIsChartFullscreen(false);
            const leftPane = document.getElementById('left-pane');
            if (leftPane) leftPane.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const cancelEdit = () => {
            setEditId(null);
            startNewEntry();
          };

          const requestDelete = (id) => {
            setDeleteConfirmId(id);
          };

          const confirmDelete = async () => {
            if (!deleteConfirmId) return;

            // ກໍລະນີໂໝດ LocalStorage ຫຼື ເມື່ອ Cloud ໃຊ້ການບໍ່ໄດ້
            if (!isCloudMode || !db) {
              const updatedSubmissions = submissions.filter(s => s && s.id !== deleteConfirmId);
              setSubmissions(updatedSubmissions);
              setDeleteConfirmId(null);
              return;
            }

            // ກໍລະນີໂໝດ Firebase Cloud
            try {
              await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments').doc(deleteConfirmId).delete();
              setDeleteConfirmId(null);
            } catch (error) {
              console.error("Error deleting document from Firestore:", error);
              setSubmitErrorMsg("ບໍ່ສາມາດລຶບຂໍ້ມູນຈາກ Cloud ໄດ້, ອາດຈະບໍ່ມີສິດທິ໌ ຫຼື ຂາດການເຊື່ອມຕໍ່.");
              setDeleteConfirmId(null);
            }
          };

          const handleChange = (name, value) => {
            setFormData(prev => ({ ...prev, [name]: value }));
            if (errors[name]) {
              setErrors(prev => {
                const newErrors = { ...prev };
                delete newErrors[name];
                return newErrors;
              });
            }
            if (name === '_103') setFormData(prev => ({ ...prev, _104: '' }));
          };

          const validateForm = () => {
            const newErrors = {};
            let isValid = true;
            let firstErrorElement = null;

            surveyStructure.forEach(section => {
              section.questions.forEach(q => {
                if (q.required && !formData[q.name]) {
                  newErrors[q.name] = 'ກະລຸນາຕອບ (Required)';
                  isValid = false;
                  if (!firstErrorElement) firstErrorElement = `question-${q.name}`;
                }
              });
            });

            setErrors(newErrors);
            if (firstErrorElement) {
              const element = document.getElementById(firstErrorElement);
              if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            return isValid;
          };

          const calculateScore = () => {
            let currentScore = 0;
            Object.keys(correctAnswers).forEach(key => {
              if (formData[key] === correctAnswers[key]) currentScore += 1;
            });
            return currentScore;
          };

          const handleSubmit = async () => {
            if (!validateForm()) return;
            setIsSubmitting(true);
            setSubmitErrorMsg(''); 
            
            const finalScore = calculateScore();
            setRecentScore({ total: finalScore, max: maxTotalScore });

            const timestampVal = editId && formData.timestamp ? formData.timestamp : (isCloudMode && db ? firebase.firestore.FieldValue.serverTimestamp() : Date.now());
            const dataToSave = {
              ...formData,
              score: finalScore,
              maxScore: maxTotalScore,
              percentage: Math.round((finalScore / maxTotalScore) * 100),
              timestamp: timestampVal,
              updatedAt: editId ? (isCloudMode && db ? firebase.firestore.FieldValue.serverTimestamp() : Date.now()) : null, 
              userId: formData.userId || user.uid
            };

            // ກໍລະນີໂໝດ LocalStorage ຫຼື ເມື່ອ Cloud ໃຊ້ການບໍ່ໄດ້: ບັນທຶກໃນເຄື່ອງ
            if (!isCloudMode || !db) {
              let updatedSubmissions;
              if (editId) {
                updatedSubmissions = submissions.map(s => s && s.id === editId ? { ...dataToSave, id: editId } : s);
              } else {
                const newDoc = { ...dataToSave, id: 'local-' + Math.random().toString(36).substr(2, 9) };
                updatedSubmissions = [...submissions, newDoc];
              }
              setSubmissions(updatedSubmissions);
              setShowResultForm(true);
              setIsSubmitting(false);
              const leftPane = document.getElementById('left-pane');
              if (leftPane) leftPane.scrollTo({ top: 0, behavior: 'smooth' });
              return;
            }

            // ກໍລະນີໂໝດ Firebase Cloud: ສົ່ງຂໍ້ມູນຂຶ້ນຄລາວ
            try {
              const assessmentsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');
              if (editId) {
                await assessmentsRef.doc(editId).update(dataToSave);
              } else {
                await assessmentsRef.add(dataToSave);
              }
              setShowResultForm(true);
              setIsSubmitting(false);
              const leftPane = document.getElementById('left-pane');
              if (leftPane) leftPane.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
              console.error("Firestore Saving Error:", error);
              // ຫາກການບັນທຶກຂຶ້ນຄລາວລົ້ມເຫຼວ (ເຊັ່ນ ບໍ່ມີອິນເຕີເນັດ ຫຼື ບໍ່ມີສິດ), ແຈ້ງເຕືອນ ແລະ ປ່ຽນໄປບັນທຶກແບບ Local
              setSubmitErrorMsg("ບໍ່ສາມາດບັນທຶກໄປຍັງ Cloud ໄດ້ (ອາດຈະບໍ່ມີອິນເຕີເນັດ ຫຼື ບໍ່ມີສິດທິ). ລະບົບຈະບັນທຶກລົງເຄື່ອງແທນ.");
              
              setIsCloudMode(false);
              const newDoc = { ...dataToSave, id: 'local-' + Math.random().toString(36).substr(2, 9), timestamp: Date.now() };
              setSubmissions(prev => [...prev, newDoc]);
              setShowResultForm(true);
              setIsSubmitting(false);
            }
          };

          const startNewEntry = () => {
            setFormData({});
            setErrors({});
            setEditId(null);
            setShowResultForm(false);
            setSubmitErrorMsg('');
            if (isAdmin) {
              const leftPane = document.getElementById('left-pane');
              if (leftPane) leftPane.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const getChoiceLabel = (listName, nameValue) => {
            if (!nameValue) return '-';
            const list = choices[listName];
            if (!list) return nameValue;
            const item = list.find(c => c.name === nameValue);
            return item ? item.label : nameValue;
          };

          // ກັ່ນຕອງຄວາມປອດໄພຂອງອາເຣ submissions
          const safeSubmissions = Array.isArray(submissions) ? submissions.filter(Boolean) : [];

          // ຈັດລຽງຂໍ້ມູນສຳລັບແຜນວາດ ຕາມລະຫັດ A-Z, ກ-ຮ
          const filteredChartData = safeSubmissions.filter(s => {
            if (!s) return false;
            if (chartFilter === 'all') return true;
            return s.assessment_time === chartFilter;
          }).sort((a, b) => {
            const codeA = (a._101 || '').toString();
            const codeB = (b._101 || '').toString();
            const cmp = codeA.localeCompare(codeB, 'lo', { numeric: true });
            if (cmp !== 0) return cmp;
            // ຖ້າລະຫັດຄືກັນ ໃຫ້ລຽງ Pre-test ຂຶ້ນກ່ອນ Post-test
            return (a.assessment_time === 'pre' ? -1 : 1);
          });

          // --- ຈັດກຸ່ມຂໍ້ມູນຢ່າງປອດໄພ ແລະ ຈັດລຽງຕາຕະລາງ ຕາມລະຫັດ A-Z, ກ-ຮ ---
          const groupedSubmissions = Object.values(safeSubmissions.reduce((acc, sub) => {
            if (!sub) return acc;
            const code = sub._101;
            if (!code) return acc;
            
            if (!acc[code]) {
              acc[code] = { code, gender: sub._101_1 || '', district: sub._104 || '', workplace: sub._105 || '', pre: null, post: null, latestTime: 0 };
            }
            if (sub.assessment_time === 'pre') acc[code].pre = sub;
            if (sub.assessment_time === 'post') acc[code].post = sub;
            
            acc[code].gender = sub._101_1 || acc[code].gender;
            acc[code].district = sub._104 || acc[code].district;
            acc[code].workplace = sub._105 || acc[code].workplace;
            
            let time = 0;
            if (sub.timestamp) {
              if (typeof sub.timestamp.toMillis === 'function') {
                  time = sub.timestamp.toMillis();
              } else if (sub.timestamp.seconds) {
                  time = sub.timestamp.seconds * 1000;
              } else if (typeof sub.timestamp === 'number') {
                  time = sub.timestamp;
              }
            }
            if (time > acc[code].latestTime) acc[code].latestTime = time;
            
            return acc;
          }, {})).sort((a, b) => {
            const codeA = (a.code || '').toString();
            const codeB = (b.code || '').toString();
            return codeA.localeCompare(codeB, 'lo', { numeric: true });
          });

          // ==========================================
          // ຟັງຊັນສຳລັບການສົ່ງອອກຂໍ້ມູນ (Export Functions)
          // ==========================================
          const prepareFlatData = () => {
            return groupedSubmissions.map(group => ({
              'ຊື່ ແລະ ນາມສະກຸນ': group.code,
              'ເພດ': group.pre ? getChoiceLabel('gender', group.pre._101_1) : (group.post ? getChoiceLabel('gender', group.post._101_1) : '-'),
              'ແຂວງ': group.pre ? getChoiceLabel('province', group.pre._103) : (group.post ? getChoiceLabel('province', group.post._103) : '-'),
              'ເມືອງ': getChoiceLabel('district', group.district),
              'ບ່ອນເຮັດວຽກ': group.workplace || '-',
              'ຄະແນນກ່ອນ (Pre-test)': group.pre ? `${group.pre.score}/10` : '-',
              'ວັນທີປະເມີນກ່ອນ': group.pre ? group.pre._102 : '-',
              'ຄະແນນຫຼັງ (Post-test)': group.post ? `${group.post.score}/10` : '-',
              'ວັນທີປະເມີນຫຼັງ': group.post ? group.post._102 : '-'
            }));
          };

          const handleExportExcel = () => {
            try {
              const flatData = prepareFlatData();
              const worksheet = XLSX.utils.json_to_sheet(flatData);
              const workbook = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(workbook, worksheet, "LMG Report");
              
              // ປັບຄວາມກວ້າງຂອງຖັນອັດຕະໂນມັດ
              const max_widths = Object.keys(flatData[0] || {}).map(key => ({
                wch: Math.max(key.length * 2, ...flatData.map(row => (row[key] || '').toString().length * 1.5))
              }));
              worksheet['!cols'] = max_widths;

              XLSX.writeFile(workbook, `ບົດລາຍງານ_LMG_${Date.now()}.xlsx`);
            } catch (err) {
              console.error("Excel Export Error:", err);
              alert("ບໍ່ສາມາດສົ່ງອອກໄຟລ໌ Excel ໄດ້.");
            }
          };

          const handleExportWord = () => {
            try {
              const flatData = prepareFlatData();
              let docHtml = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                  <meta charset="utf-8">
                  <title>ບົດລາຍງານ LMG</title>
                  <style>
                    body { font-family: 'Noto Sans Lao', Arial, sans-serif; line-height: 1.6; }
                    h2 { text-align: center; color: #1e3a8a; font-size: 18pt; margin-bottom: 5px; }
                    p { text-align: center; color: #555; margin-bottom: 25px; }
                    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
                    th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 11pt; }
                    th { background-color: #f1f5f9; color: #1e293b; font-weight: bold; }
                    .center { text-align: center; }
                  </style>
                </head>
                <body>
                  <h2>ບົດລາຍງານຜົນການປະເມີນ ກ່ອນ-ຫຼັງ ຝຶກອົບຮົມ LMG</h2>
                  <p>ວັນທີດຶງບົດລາຍງານ: ${new Date().toLocaleDateString('lo-LA')}</p>
                  <table>
                    <thead>
                      <tr>
                        <th>ຊື່ ແລະ ນາມສະກຸນ</th>
                        <th>ເພດ</th>
                        <th>ແຂວງ</th>
                        <th>ເມືອງ</th>
                        <th>ບ່ອນເຮັດວຽກ</th>
                        <th class="center">ຄະແນນກ່ອນ</th>
                        <th class="center">ວັນທີກ່ອນ</th>
                        <th class="center">ຄະແນນຫຼັງ</th>
                        <th class="center">ວັນທີຫຼັງ</th>
                      </tr>
                    </thead>
                    <tbody>
              `;

              flatData.forEach(item => {
                docHtml += `
                  <tr>
                    <td><b>${item['ຊື່ ແລະ ນາມສະກຸນ']}</b></td>
                    <td>${item['ເພດ']}</td>
                    <td>${item['ແຂວງ']}</td>
                    <td>${item['ເມືອງ']}</td>
                    <td>${item['ບ່ອນເຮັດວຽກ']}</td>
                    <td class="center" style="color: #35675d; font-weight: bold;">${item['ຄະແນນກ່ອນ (Pre-test)']}</td>
                    <td class="center">${item['ວັນທີປະເມີນກ່ອນ']}</td>
                    <td class="center" style="color: #bf5a38; font-weight: bold;">${item['ຄະແນນຫຼັງ (Post-test)']}</td>
                    <td class="center">${item['ວັນທີປະເມີນຫຼັງ']}</td>
                  </tr>
                `;
              });

              docHtml += `
                    </tbody>
                  </table>
                </body>
                </html>
              `;

              const blob = new Blob(['\ufeff' + docHtml], { type: 'application/msword;charset=utf-8' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `ບົດລາຍງານ_LMG_${Date.now()}.doc`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            } catch (err) {
              console.error("Word Export Error:", err);
              alert("ບໍ່ສາມາດສົ່ງອອກໄຟລ໌ Word ໄດ້.");
            }
          };

          const handleExportPDF = () => {
            try {
              const element = document.createElement('div');
              element.style.padding = '25px';
              element.style.background = '#ffffff';
              
              element.innerHTML = `
                <div style="font-family: 'Noto Sans Lao', sans-serif;">
                  <div style="text-align: center; margin-bottom: 25px;">
                    <h2 style="font-size: 22px; color: #1e3a8a; font-weight: bold; margin-bottom: 5px;">ບົດລາຍງານຜົນການປະເມີນ ກ່ອນ-ຫຼັງ ຝຶກອົບຮົມ LMG</h2>
                    <p style="font-size: 12px; color: #4b5563;">ວັນທີດຶງບົດລາຍງານ: ${new Date().toLocaleDateString('lo-LA')}</p>
                  </div>
                  <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px;">
                    <thead>
                      <tr style="background-color: #f1f5f9;">
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; color: #1e293b;">ຊື່ ແລະ ນາມສະກຸນ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; color: #1e293b;">ເພດ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; color: #1e293b;">ແຂວງ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; color: #1e293b;">ເມືອງ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold; color: #1e293b;">ບ່ອນເຮັດວຽກ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #1e293b;">ຄະແນນກ່ອນ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #1e293b;">ວັນທີກ່ອນ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #1e293b;">ຄະແນນຫຼັງ</th>
                        <th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #1e293b;">ວັນທີຫຼັງ</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${groupedSubmissions.map(group => `
                        <tr style="border-bottom: 1px solid #e2e8f0;">
                          <td style="border: 1px solid #cbd5e1; padding: 10px; font-weight: bold; color: #1e293b;">${group.code}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; color: #334155;">${getChoiceLabel('gender', group.gender)}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; color: #334155;">${group.pre ? getChoiceLabel('province', group.pre._103) : (group.post ? getChoiceLabel('province', group.post._103) : '-')}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; color: #334155;">${getChoiceLabel('district', group.district)}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; color: #334155;">${group.workplace || '-'}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #35675d;">${group.pre ? `${group.pre.score}/10` : '-'}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; color: #475569;">${group.pre ? group.pre._102 : '-'}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #bf5a38;">${group.post ? `${group.post.score}/10` : '-'}</td>
                          <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; color: #475569;">${group.post ? group.post._102 : '-'}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `;
              
              const opt = {
                margin:       10,
                filename:     `ບົດລາຍງານ_LMG_${Date.now()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
              };
              
              html2pdf().set(opt).from(element).save();
            } catch (err) {
              console.error("PDF Export Error:", err);
              alert("ບໍ່ສາມາດສົ່ງອອກໄຟລ໌ PDF ໄດ້.");
            }
          };

          return (
            <React.Fragment>

              {/* ແຖບສະແດງສະຖານະເມື່ອເຊື່ອມຕໍ່ Cloud Firebase ຜິດພາດ ຫຼື ບໍ່ໄດ້ຕັ້ງຄ່າ */}
              {(!isFirebaseConfigured || !isCloudMode) && (
                <div className="bg-yellow-500 text-white text-center py-2 px-4 text-sm font-bold shadow-md print:hidden flex items-center justify-center gap-2 font-noto">
                  <Icon.AlertCircle className="w-5 h-5 text-white" />
                  <span>ແລ່ນໃນໂໝດ LocalStorage (ຂໍ້ມູນບັນທຶກສະເພາະໃນເຄື່ອງນີ້) ເນື່ອງຈາກຍັງບໍ່ໄດ້ເຊື່ອມຕໍ່ Firebase ຄລາວ.</span>
                </div>
              )}

              {/* ແຖບສະແດງສະຖານະເມື່ອເຊື່ອມຕໍ່ Cloud Firebase ສົມບູນ */}
              {isFirebaseConfigured && isCloudMode && (
                <div className="bg-blue-600 text-white text-center py-2 px-4 text-sm font-bold shadow-md print:hidden flex items-center justify-center gap-2 font-noto">
                  <Icon.CheckCircle className="w-5 h-5 text-white" />
                  <span>ເຊື່ອມຕໍ່ຖານຂໍ້ມູນຄລາວສຳເລັດ (Cloud Sync Active) — ຂໍ້ມູນທຸກເຄື່ອງຈະຊິງຄ໌ຫາກັນທັນທີ!</span>
                </div>
              )}

              {showAdminLogin && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative animate-in fade-in zoom-in duration-200">
                    <button onClick={() => setShowAdminLogin(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-full p-1 transition-colors">
                      <Icon.X className="w-5 h-5" />
                    </button>
                    <div className="flex justify-center mb-4 mt-2">
                      <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">
                        <Icon.Lock className="w-7 h-7 text-blue-600" />
                      </div>
                    </div>
                    <h3 className="text-xl font-bold text-center text-gray-800 mb-1">ເຂົ້າສູ່ລະບົບຜູ້ບໍລິຫານ</h3>
                    <p className="text-center text-gray-500 text-sm mb-6">Admin Dashboard Login</p>
                    
                    <input type="password" placeholder="ປ້ອນລະຫັດຜ່ານ (ລະຫັດ: admin)" value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminSubmit()} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-center font-sans" autoFocus />
                    
                    {adminLoginError && (
                      <div className="mb-4 text-sm text-red-600 bg-red-50 p-2 rounded text-center flex justify-center items-center">
                        <Icon.AlertCircle className="w-4 h-4 mr-1 text-red-500" />{adminLoginError}
                      </div>
                    )}
                    <button onClick={handleAdminSubmit} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-sm">
                      ຢືນຢັນ (Login)
                    </button>
                  </div>
                </div>
              )}

              {showNewFormModal && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-3xl w-full max-w-2xl p-6 md:p-8 shadow-2xl relative flex flex-col max-h-[90vh]">
                    <button onClick={() => { setShowNewFormModal(false); setNewFormCopied(false); }} className="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">
                      <Icon.X className="w-5 h-5" />
                    </button>

                    <h2 className="text-xl md:text-2xl font-bold mb-2 flex items-center text-gray-800">
                      <Icon.FileText className="w-6 h-6 mr-2 text-blue-600" /> ກອບປີ້ ແລະ ວາງແບບຟອມໃໝ່
                    </h2>
                    <p className="text-gray-600 text-sm md:text-base mb-4 leading-relaxed">
                      ເນື່ອງຈາກແຕ່ລະແບບຟອມມີໂຄງສ້າງຖານຂໍ້ມູນ ແລະ ກຣາຟໃຫ້ຄະແນນທີ່ແຕກຕ່າງກັນ. ວິທີທີ່ດີທີ່ສຸດແມ່ນການສັ່ງໃຫ້ AI ຂອງພວກເຮົາຂຽນລະບົບໃໝ່ໃຫ້ທ່ານ! <br/>
                      ພຽງແຕ່ <strong className="text-blue-600">ວາງ (Paste)</strong> ຂໍ້ມູນຄຳຖາມ, ຕົວເລືອກ ແລະ ສະເຫຼີຍຄຳຕອບ ຈາກ Word ຫຼື Excel ລົງໃນກ່ອງນີ້ ແລ້ວກົດປຸ່ມສົ່ງດ້ານລຸ່ມ.
                    </p>

                    <textarea
                      className="w-full flex-1 min-h-[250px] p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-sans mb-4 resize-none"
                      placeholder={`ຕົວຢ່າງແບບຟອມ:\n\n1. ຄຳຖາມທີ 1...\nA. ຕົວເລືອກ 1\nB. ຕົວເລືອກ 2\nC. ຕົວເລືອກ 3\n(ຄຳຕອບທີ່ຖືກຄື: B)\n\n2. ຄຳຖາມທີ 2...`}
                      value={newFormText}
                      onChange={(e) => setNewFormText(e.target.value)}
                    ></textarea>

                    {newFormCopied ? (
                      <div className="bg-green-50 border border-green-200 text-green-700 p-5 rounded-xl text-center animate-in fade-in zoom-in duration-300">
                        <Icon.CheckCircle className="w-8 h-8 mx-auto mb-2 text-green-500" />
                        <h3 className="text-lg font-bold mb-1">ກຽມຂໍ້ມູນສຳເລັດແລ້ວ!</h3>
                        <p className="text-sm">
                          ...<b><b>ຂໍ້ມູນໄດ້ຖືກກັອບປີ້ໄວ້ແລ້ວ.</b></b> ກະລຸນາຄລິກໃສ່ <b>ຊ່ອງແຊັດ (Chat) ດ້ານຊ້າຍມື</b> <br/>
                          ແລ້ວກົດ <b>Ctrl+V (ຫຼື ກົດ Paste)</b> ແລ້ວກົດສົ່ງ ເພື່ອໃຫ້ຂ້າພະເຈົ້າສ້າງແອັບໂຕໃໝ່ໃຫ້ທ່ານເລີຍ.
                        </p>
                      </div>
                    ) : (
                      <button
                        onClick={handleGenerateNewForm}
                        disabled={!newFormText.trim()}
                        className={`w-full py-4 text-white font-bold text-lg rounded-xl shadow flex justify-center items-center transition-transform ${!newFormText.trim() ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-[0.98]'}`}
                      >
                        <Icon.Lightbulb className="w-5 h-5 mr-2 text-white" /> ກຽມຂໍ້ມູນເພື່ອໃຫ້ AI ສ້າງແອັບໃໝ່
                      </button>
                    )}
                  </div>
                </div>
              )}

                          <p className={`text-sm leading-relaxed mt-2 px-4 ${editId ? 'text-yellow-700' : 'text-gray-600'}`}>
                            {editId 
                              ? `ກຳລັງແກ້ໄຂຂໍ້ມູນຂອງລະຫັດ: ${formData._101}`

                        <div className="bg-blue-50 border border-blue-100 rounded-xl p-6 mb-8 inline-block w-full max-w-xs">

                          <div className="text-5xl font-bold text-blue-600 font-sans">{recentScore?.total}<span className="text-2xl text-blue-400">/{recentScore?.max}</span></div>

                            onClick={() => setIsChartFullscreen(!isChartFullscreen)}

                            title={isChartFullscreen ? "ຫຍໍ້ໜ້າຈໍ" : "ຂະຫຍາຍເຕັມຈໍ"}

                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3">
                          <button

                          </button>

                          <div className="flex bg-gray-100 p-1 rounded-lg shrink-0">
                            <button onClick={() => setChartFilter('all')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${chartFilter==='all' ? 'bg-white shadow text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>ທັງໝົດ</button>
                            <button onClick={() => setChartFilter('pre')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${chartFilter==='pre' ? 'text-white shadow' : 'text-gray-500 hover:text-gray-700'}`} style={chartFilter==='pre' ? {backgroundColor: '#35675D'} : {}}>Pre-test</button>
                            <button onClick={() => setChartFilter('post')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${chartFilter==='post' ? 'text-white shadow' : 'text-gray-500 hover:text-gray-700'}`} style={chartFilter==='post' ? {backgroundColor: '#BF5A38'} : {}}>Post-test</button>

                      </div>

                          <div className="flex items-center text-xs text-gray-600 font-noto">
                            <span className="w-3 h-3 rounded-sm mr-2" style={{ backgroundColor: '#35675D' }}></span>

                          <div className="flex items-center text-xs text-gray-600 font-noto">
                            <span className="w-3 h-3 rounded-sm mr-2" style={{ backgroundColor: '#BF5A38' }}></span>

                          </div>
                        </div>
                      </div>

                      {/* === BOTTOM 3 QUESTIONS GRAPH === */}
                      <div className="bg-white border border-gray-200 rounded-2xl shadow-sm p-4 mb-8">

                        <BottomThreeChart data={filteredChartData} correctAnswers={correctAnswers} surveyStructure={surveyStructure} />

                        {/* ຫົວຂໍ້ຕາຕະລາງລາຍການຂໍ້ມູນທັງໝົດ ພ້ອມປຸ່ມ dropdown ສົ່ງອອກຜົນ */}

                            >
                              <Icon.Export className="w-3.5 h-3.5 text-gray-600" />
                              <span>ສົ່ງອອກຂໍ້ມູນ</span>
                              <svg className="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>
                            </button>

                            {/* ກ່ອງພື້ນຫຼັງໂປ່ງໃສ ເພື່ອໃຫ້ຄລິກບ່ອນອື່ນແລ້ວປິດ Dropdown */}

                              <div className="fixed inset-0 z-10 bg-transparent" onClick={() => setShowExportDropdown(false)} />
                            )}

                                    <span>Excel (.xlsx)</span>
                                  </button>
                                  <button 
                                    onClick={() => { handleExportWord(); setShowExportDropdown(false); }}

                                  >
                                    <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                                    <span>PDF (.pdf)</span>
                                  </button>
                                </div>
                              </div>

                                <tr>
                                  <td colSpan="7" className="p-8 text-center text-gray-400 text-sm">ຍັງບໍ່ມີຂໍ້ມູນ</td>

                              ) : (
                                groupedSubmissions.map((group) => (
                                  <tr key={group.code} className="border-b last:border-b-0 hover:bg-gray-50/50 transition-colors bg-white">
                                    <td className="p-3 font-bold text-gray-800 font-sans text-sm">{group.code}</td>
                                    <td className="p-3 text-xs text-gray-600 truncate max-w-[80px]">
                                      {getChoiceLabel('gender', group.gender)}
                                    </td>
                                    <td className="p-3 text-xs text-gray-600 truncate max-w-[120px]" title={getChoiceLabel('district', group.district)}>
                                      {getChoiceLabel('district', group.district)}
                                    </td>
                                    <td className="p-3 text-xs text-gray-600 truncate max-w-[120px]" title={group.workplace}>
                                      {group.workplace || '-'}
                                    </td>
                                    <td className="p-3 text-sm font-bold font-sans text-center">
                                      {group.pre ? (
                                        <span className="px-2 py-1 bg-[#35675D]/10 text-[#35675D] rounded cursor-help" title={`ວັນທີປະເມີນ: ${group.pre._102}`}>{group.pre.score}</span>
                                      ) : <span className="text-gray-300">-</span>}
                                    </td>
                                    <td className="p-3 text-sm font-bold font-sans text-center">
                                      {group.post ? (
                                        <span className="px-2 py-1 bg-[#BF5A38]/10 text-[#BF5A38] rounded cursor-help" title={`ວັນທີປະເມີນ: ${group.post._102}`}>{group.post.score}</span>
                                      ) : <span className="text-gray-300">-</span>}
                                    </td>
                                    <td className="p-3 text-right">
                                      <div className="flex flex-col items-end justify-center gap-1.5">
                                        {group.pre && (
                                          <div className="flex items-center gap-1">
                                            <span className="text-[9px] text-[#35675D] font-bold mr-1">ກ່ອນ:</span>
                                            <button onClick={() => { setSelectedSubmission(group.pre); setIsChartFullscreen(false); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="ເບິ່ງລາຍລະອຽດກ່ອນການຝຶກອົບຮົມ"><Icon.Eye className="w-4 h-4" /></button>
                                            <button onClick={() => handleEditClick(group.pre)} className="p-1 text-yellow-600 hover:bg-yellow-50 rounded transition-colors" title="ແກ້ໄຂຂໍ້ມູນກ່ອນການຝຶກອົບຮົມ"><Icon.Edit className="w-4 h-4" /></button>
                                            <button onClick={() => requestDelete(group.pre.id)} className="p-1 text-red-500 hover:bg-red-50 rounded transition-colors" title="ລຶບຂໍ້ມູນກ່ອນການຝຶກອົບຮົມ"><Icon.Trash className="w-4 h-4 text-red-500" /></button>
                                          </div>
                                        )}
                                        {group.post && (
                                          <div className="flex items-center gap-1">
                                            <span className="text-[9px] text-[#BF5A38] font-bold mr-1">ຫຼັງ:</span>
                                            <button onClick={() => { setSelectedSubmission(group.post); setIsChartFullscreen(false); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="ເບິ່ງລາຍລະອຽດຫຼັງການຝຶກອົບຮົມ"><Icon.Eye className="w-4 h-4" /></button>
                                            <button onClick={() => handleEditClick(group.post)} className="p-1 text-yellow-600 hover:bg-yellow-50 rounded transition-colors" title="ແກ້ໄຂຂໍ້ມູນຫຼັງການຝຶກອົບຮົມ"><Icon.Edit className="w-4 h-4" /></button>
                                            <button onClick={() => requestDelete(group.post.id)} className="p-1 text-red-500 hover:bg-red-50 rounded transition-colors" title="ລຶບຂໍ້ມູນຫຼັງການຝຶກອົບຮົມ"><Icon.Trash className="w-4 h-4 text-red-500" /></button>
                                          </div>
                                        )}
                                      </div>
                                    </td>
                                  </tr>
                                ))
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>

                    </div>
                  </div>
                )}

              </div>
              
              {/* Individual Result Modal */}
              {selectedSubmission && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-3xl w-full max-w-lg p-6 shadow-2xl relative">
                    <button onClick={() => setSelectedSubmission(null)} className="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors"><Icon.X /></button>
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon.User /> ຂໍ້ມູນລາຍບຸກຄົນ</h2>
                    <div className="space-y-3">
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ຊື່ ແລະ ນາມສະກຸນ:</span> <strong className="font-sans">{selectedSubmission._101}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ເພດ:</span> <strong className="font-sans">{getChoiceLabel('gender', selectedSubmission._101_1)}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ການປະເມີນ:</span> <strong>{selectedSubmission.assessment_time === 'pre' ? 'Pre-test' : 'Post-test'}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ເມືອງ:</span> <strong>{getChoiceLabel('district', selectedSubmission._104)}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ບ່ອນເຮັດວຽກ:</span> <strong>{selectedSubmission._105 || '-'}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ວັນທີ:</span> <strong>{selectedSubmission._102}</strong></p>
                      <div className="bg-gray-50 p-4 rounded-xl mt-4 text-center">
                        <span className="block text-gray-500 text-sm mb-1">ຄະແນນລວມ</span>
                        <strong className="text-4xl font-sans text-blue-600">{selectedSubmission.score}<span className="text-xl text-gray-400">/{selectedSubmission.maxScore}</span></strong>
                      </div>
                    </div>
                    <button onClick={() => { handleEditClick(selectedSubmission); setSelectedSubmission(null); }} className="w-full mt-4 py-3 bg-yellow-500 text-white font-bold rounded-xl hover:bg-yellow-600 transition-colors flex justify-center items-center gap-2">
                      <Icon.Edit className="w-5 h-5 text-white" /> ແກ້ໄຂຂໍ້ມູນນີ້ (Edit)
                    </button>
                  </div>
                </div>
              )}

              {/* === AI CHATBOX COMPONENT === */}
              <AIChatBox />

            </React.Fragment>
          );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
