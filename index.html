          }, [lang]);

            if (!input.trim() || isLoading) return;
            const userMsg = input.trim();
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
            setIsLoading(true);

               const apiKey = ""; 
               const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
               let response; let retries = 0; const delays = [1000, 2000, 4000, 8000, 16000];
               const sysInst = lang === 'en' ? "Please respond in English." : "ຕອບເປັນພາສາລາວສະເໝີ ແລະ ສຸພາບ.";

               while (retries <= 5) {
                 try {
                   response = await fetch(url, {
                     method: 'POST', headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({
                       contents: [{ parts: [{ text: userMsg }] }],
                       systemInstruction: { parts: [{ text: `ເຈົ້າເປັນຜູ້ຊ່ວຍ AI ສຳລັບລະບົບປະເມີນຜົນ LMG. ${sysInst} ຕອບໃຫ້ສັ້ນກະທັດຮັດເຂົ້າໃຈງ່າຍ.` }] }
                     })
                   });
                   if (response.ok) break;
                   if (retries === 5) throw new Error("Max retries reached");
                   await new Promise(r => setTimeout(r, delays[retries]));
                   retries++;
                 } catch (e) {
                   if (retries === 5) throw e;
                   await new Promise(r => setTimeout(r, delays[retries]));
                   retries++;
                 }
               }
               const data = await response.json();
               const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || t("ຂໍອະໄພ, ເກີດຂໍ້ຜິດພາດໃນການປະມວນຜົນ.", "Error processing.");
               setMessages(prev => [...prev, { role: 'model', text: aiText }]);
            } catch (error) {
               setMessages(prev => [...prev, { role: 'model', text: t("ຂໍອະໄພ, ບໍ່ສາມາດເຊື່ອມຕໍ່ກັບ AI ໄດ້.", "Unable to connect to AI.") }]);
            } finally {
               setIsLoading(false);
            }
          };

          return (
            <div className="fixed bottom-4 right-4 z-[999] font-noto">
              {isOpen ? (
                <div className="bg-white w-80 md:w-96 rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden animate-in slide-in-from-bottom-4">
                  <div className="bg-blue-600 text-white p-3 flex justify-between items-center">
                    <div className="flex items-center gap-2"><Icon.MessageCircle className="w-5 h-5" /><span className="font-bold text-sm">{t('ຜູ້ຊ່ວຍ AI', 'AI Assistant')}</span></div>
                    <button onClick={() => setIsOpen(false)} className="hover:bg-blue-700 p-1 rounded"><Icon.X className="w-5 h-5" /></button>
                  </div>
                  <div className="h-80 overflow-y-auto p-4 flex flex-col gap-3 bg-gray-50">
                    {messages.map((msg, idx) => (
                      <div key={idx} className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'self-end items-end' : 'self-start items-start'}`}>
                        <div className={`p-3 rounded-2xl ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white border text-gray-800 rounded-bl-sm shadow-sm'}`}>
                          <p className="text-sm whitespace-pre-wrap leading-relaxed">{msg.text}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="p-3 bg-white border-t border-gray-200 flex gap-2">
                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMessage()} placeholder={t("ພິມຂໍ້ຄວາມ...", "Type a message...")} className="flex-1 px-3 py-2 bg-gray-100 rounded-xl text-sm focus:bg-white focus:ring-2 outline-none" disabled={isLoading} />
                    <button onClick={sendMessage} disabled={!input.trim() || isLoading} className="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:bg-gray-300 flex items-center justify-center"><Icon.Send className="w-5 h-5" /></button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setIsOpen(true)} className="bg-blue-600 text-white p-4 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:bg-blue-700 hover:scale-105 transition-all"><Icon.MessageCircle className="w-6 h-6" /></button>
              )}
            </div>
          );
        };

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        function App() {
          const [lang, setLang] = useState('lo');
          const t = (loStr, enStr) => lang === 'en' ? enStr : loStr;
          const [user, setUser] = useState(null);
          const [isAdmin, setIsAdmin] = useState(false); 
          const [isChartFullscreen, setIsChartFullscreen] = useState(false);
          const [showAdminLogin, setShowAdminLogin] = useState(false);
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [adminLoginError, setAdminLoginError] = useState('');
          const [showNewFormModal, setShowNewFormModal] = useState(false);
          const [newFormText, setNewFormText] = useState('');
          const [newFormCopied, setNewFormCopied] = useState(false);
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          const [formData, setFormData] = useState({});
          const [errors, setErrors] = useState({});
          const [submitErrorMsg, setSubmitErrorMsg] = useState(''); 
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [showResultForm, setShowResultForm] = useState(false); 
          const [recentScore, setRecentScore] = useState(null);
          const [editId, setEditId] = useState(null);
          const [submissions, setSubmissions] = useState([]);
          const [chartFilter, setChartFilter] = useState('all'); 
          const [selectedSubmission, setSelectedSubmission] = useState(null);
          const [showExportDropdown, setShowExportDropdown] = useState(false);
          const [showImportDropdown, setShowImportDropdown] = useState(false);
          const [showBlankFormDropdown, setShowBlankFormDropdown] = useState(false);
          const maxTotalScore = Object.keys(correctAnswers).length;

          useEffect(() => {
            const initAuth = async () => {
              if (!auth) { setUser({ uid: 'demo-user', isAnonymous: true }); return; }
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                else await auth.signInAnonymously();
              } catch (error) {}
            };
            initAuth();
            if (auth) { const unsub = auth.onAuthStateChanged(setUser); return () => unsub(); }
          }, []);

          useEffect(() => {
            if (!user || !isAdmin) return;
            if (!db) {
              if (submissions.length === 0) {
                setSubmissions([
                  { id: 'demo-1', _101: 'John Doe', _101_1: 'm', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'Hospital', assessment_time: 'pre', score: 4, maxScore: 10, timestamp: { toMillis: () => Date.now() - 3600000 } },
                  { id: 'demo-2', _101: 'John Doe', _101_1: 'm', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'Hospital', assessment_time: 'post', score: 8, maxScore: 10, timestamp: { toMillis: () => Date.now() } }
                ]);
              }
              return;
            }
            const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');
            const unsubscribe = q.onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => {
                  if (!a.timestamp) return 1; if (!b.timestamp) return -1;
                  return (typeof a.timestamp.toMillis === 'function' ? a.timestamp.toMillis() : a.timestamp) - (typeof b.timestamp.toMillis === 'function' ? b.timestamp.toMillis() : b.timestamp); 
                });
                setSubmissions(data);
              }
            );
            return () => unsubscribe();
          }, [user, isAdmin]);

          const handleAdminToggleClick = () => {
            if (isAdmin) { setIsAdmin(false); setIsChartFullscreen(false); cancelEdit(); } 
            else { setAdminPasswordInput(''); setAdminLoginError(''); setShowAdminLogin(true); }
          };

          const handleAdminSubmit = () => {
            if (adminPasswordInput === 'admin') { setIsAdmin(true); setShowAdminLogin(false); } 
            else { setAdminLoginError(t('ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ!', 'Incorrect Password!')); }
          };

          const handleGenerateNewForm = () => {
            const promptText = lang === 'lo' ? `ຊ່ວຍສ້າງແອັບປະເມີນຜົນໃໝ່ໃຫ້ຂ້ອຍແດ່...\n\n${newFormText}` : `Help me create a new assessment app...\n\n${newFormText}`;
            const textArea = document.createElement("textarea"); textArea.value = promptText; document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); setNewFormCopied(true); setTimeout(() => { setNewFormCopied(false); setShowNewFormModal(false); setNewFormText(''); }, 15000); } 
            catch (err) { alert(t("ກະລຸນາກັອບປີ້ດ້ວຍຕົນເອງ", "Please copy manually")); }
            document.body.removeChild(textArea);
          };

          const handleEditClick = (sub) => { setFormData(sub); setEditId(sub.id); setShowResultForm(false); setIsChartFullscreen(false); document.getElementById('left-pane').scrollTo({ top: 0, behavior: 'smooth' }); };
          const cancelEdit = () => { setEditId(null); startNewEntry(); };
          const requestDelete = (id) => { setDeleteConfirmId(id); };

          const confirmDelete = async () => {
            if (!deleteConfirmId) return;
            if (!db) { setSubmissions(prev => prev.filter(s => s.id !== deleteConfirmId)); setDeleteConfirmId(null); return; }
            try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments').doc(deleteConfirmId).delete(); setDeleteConfirmId(null); } 
            catch (error) { setSubmitErrorMsg(t("ບໍ່ສາມາດລຶບໄດ້.", "Cannot delete.")); setDeleteConfirmId(null); }
          };

          const handleChange = (name, value) => {
            setFormData(prev => ({ ...prev, [name]: value }));
            if (errors[name]) { setErrors(prev => { const ne = { ...prev }; delete ne[name]; return ne; }); }
            if (name === '_103') setFormData(prev => ({ ...prev, _104: '' }));
          };

          const validateForm = () => {
            const ne = {}; let isValid = true; let firstErr = null;
            surveyStructure.forEach(sec => sec.questions.forEach(q => {
              if (q.required && !formData[q.name]) { ne[q.name] = t('ກະລຸນາຕອບ', 'Required'); isValid = false; if (!firstErr) firstErr = `question-${q.name}`; }
            }));
            setErrors(ne);
            if (firstErr) { const el = document.getElementById(firstErr); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            return isValid;
          };

          const handleSubmit = async () => {
            if (!validateForm() || !user) return;
            setIsSubmitting(true); setSubmitErrorMsg(''); 
            let score = 0; Object.keys(correctAnswers).forEach(k => { if (formData[k] === correctAnswers[k]) score += 1; });
            setRecentScore({ total: score, max: maxTotalScore });

            const dataToSave = {
              ...formData, score: score, maxScore: maxTotalScore, percentage: Math.round((score / maxTotalScore) * 100),
              timestamp: editId ? formData.timestamp : (db ? firebase.firestore.FieldValue.serverTimestamp() : Date.now()),
              userId: formData.userId || user.uid 
            };

            if (!db) {
              if (editId) setSubmissions(prev => prev.map(s => s.id === editId ? { ...dataToSave, id: editId } : s));
              else setSubmissions(prev => [...prev, { ...dataToSave, id: 'local-' + Date.now() }]);
              setShowResultForm(true); setIsSubmitting(false);
              window.scrollTo({ top: 0, behavior: 'smooth' }); return;
            }

            try {
              const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');
              if (editId) await ref.doc(editId).update(dataToSave); else await ref.add(dataToSave);
              setShowResultForm(true); window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) { setSubmitErrorMsg(t("ບໍ່ສາມາດບັນທຶກໄດ້.", "Cannot save right now.")); } 
            finally { setIsSubmitting(false); }
          };

          const startNewEntry = () => { setFormData({}); setErrors({}); setEditId(null); setShowResultForm(false); setSubmitErrorMsg(''); window.scrollTo({ top: 0, behavior: 'smooth' }); };
          const getChoiceLabel = (listName, val) => { const item = (choices[listName]||[]).find(c => c.name === val); return item ? item.label[lang] : (val||'-'); };
          const filteredChartData = submissions.filter(s => chartFilter === 'all' || s.assessment_time === chartFilter);

          const prepareFlatData = () => {
            return groupedSubmissions.map(g => ({
              [t('ຊື່ ແລະ ນາມສະກຸນ', 'Name')]: g.code,
              [t('ເພດ', 'Gender')]: g.pre ? getChoiceLabel('gender', g.pre._101_1) : (g.post ? getChoiceLabel('gender', g.post._101_1) : '-'),
              [t('ແຂວງ', 'Province')]: g.pre ? getChoiceLabel('province', g.pre._103) : (g.post ? getChoiceLabel('province', g.post._103) : '-'),
              [t('ເມືອງ', 'District')]: getChoiceLabel('district', g.district),
              [t('ບ່ອນເຮັດວຽກ', 'Workplace')]: g.workplace || '-',
              [t('ຄະແນນກ່ອນ (Pre)', 'Pre Score')]: g.pre ? `${g.pre.score}/${maxTotalScore}` : '-',
              [t('ວັນທີ (Pre)', 'Pre Date')]: g.pre ? g.pre._102 : '-',
              [t('ຄະແນນຫຼັງ (Post)', 'Post Score')]: g.post ? `${g.post.score}/${maxTotalScore}` : '-',
              [t('ວັນທີ (Post)', 'Post Date')]: g.post ? g.post._102 : '-'
            }));
          };

          const handleExportExcel = () => {
            const ws = window.XLSX.utils.json_to_sheet(prepareFlatData());
            const wb = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(wb, ws, "LMG Report");
            window.XLSX.writeFile(wb, `LMG_Report_${Date.now()}.xlsx`);
          };

          const handleExportWord = () => {
            const html = `<html><head><meta charset="utf-8"></head><body><h2>${t('ລາຍງານ LMG','LMG Report')}</h2><table border="1">
              <tr><th>Name</th><th>Pre</th><th>Post</th></tr>
              ${groupedSubmissions.map(g => `<tr><td>${g.code}</td><td>${g.pre?g.pre.score:'-'}</td><td>${g.post?g.post.score:'-'}</td></tr>`).join('')}
            </table></body></html>`;
            const blob = new Blob(['\ufeff' + html], { type: 'application/msword;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `LMG_Report.doc`; a.click();
          };

          const handleExportPDF = () => {
            const el = document.createElement('div'); el.style.padding = '20px';
            el.innerHTML = `<h2>${t('ລາຍງານ LMG','LMG Report')}</h2><table border="1" style="width:100%;text-align:left;border-collapse:collapse;">
              <tr><th style="padding:8px">Name</th><th style="padding:8px">Pre</th><th style="padding:8px">Post</th></tr>
              ${groupedSubmissions.map(g => `<tr><td style="padding:8px">${g.code}</td><td style="padding:8px">${g.pre?g.pre.score:'-'}</td><td style="padding:8px">${g.post?g.post.score:'-'}</td></tr>`).join('')}
            </table>`;
            window.html2pdf().set({ margin: 10, filename: `LMG_Report.pdf` }).from(el).save();
          };

          const handleExportBlankFormWord = () => {
            let html = `<html><head><meta charset="utf-8"></head><body><h2>${t('ແບບຟອມ LMG', 'LMG Form')}</h2>`;
            surveyStructure.forEach(sec => {
              html += `<h3>${sec.title[lang]}</h3>`;
              sec.questions.forEach(q => {
                html += `<p><b>${q.label[lang]}</b><br/>`;
                if(q.choices) choices[q.choices].forEach(c => html += `[ ] ${c.label[lang]}<br/>`);
                else html += `................................</p>`;
              });
            });
            html += `</body></html>`;
            const blob = new Blob(['\ufeff' + html], { type: 'application/msword;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Blank_Form.doc`; a.click();
          };

          const handleExportBlankFormPDF = () => {
            const el = document.createElement('div'); el.style.padding = '20px';
            let html = `<h2>${t('ແບບຟອມ LMG', 'LMG Form')}</h2>`;
            surveyStructure.forEach(sec => {
              html += `<h3>${sec.title[lang]}</h3>`;
              sec.questions.forEach(q => {
                html += `<div style="margin-bottom:15px"><b>${q.label[lang]}</b><br/>`;
                if(q.choices) choices[q.choices].forEach(c => html += `<div style="margin-top:5px">[ ] ${c.label[lang]}</div>`);
                else html += `<div style="margin-top:5px">................................................</div>`;
                html += `</div>`;
              });
            });
            el.innerHTML = html;
            window.html2pdf().set({ margin: 10, filename: `Blank_Form.pdf` }).from(el).save();
          };

          const handleDownloadTemplate = () => {
            const hdrs = []; const desc = []; const ex = [];
            surveyStructure.forEach(sec => sec.questions.forEach(q => {
              hdrs.push(q.label[lang]);
              desc.push(q.choices ? choices[q.choices].map(c=>`[${c.name}]=${c.label[lang]}`).join(' | ') : '...');
              ex.push(q.name==='_101'?'Example Name':(q.choices?choices[q.choices][0].name:'-'));
            }));
            const ws = window.XLSX.utils.aoa_to_sheet([hdrs, desc, ex]);
            const wb = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(wb, ws, "Template");
            window.XLSX.writeFile(wb, `LMG_Template_${lang}.xlsx`);
          };

          const handleImportFile = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (evt) => {
              try {
                const wb = window.XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                const json = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                if (json.length < 2) return;
                const map = {}; surveyStructure.forEach(s=>s.questions.forEach(q=>{ map[q.label.lo.trim().toLowerCase()]=q.name; map[q.label.en.trim().toLowerCase()]=q.name; map[q.name]=q.name; }));
                const head = json[0]; const start = (json[1]&&String(json[1][0]).includes(']'))?2:1;
                let newSubs = [];
                for (let i = start; i < json.length; i++) {
                  if(!json[i] || !json[i].some(c=>c)) continue;
                  const row = {}; head.forEach((h,idx)=>{ if(h) row[map[String(h).trim().toLowerCase()]||h]=json[i][idx]; });
                  if (!row['_101'] || row['_101']==='Example Name' || row['_101']==='ຕົວຢ່າງ ຊື່ ນາມສະກຸນ') continue;
                  let score = 0; Object.keys(correctAnswers).forEach(k=>{ if(String(row[k]).trim().toLowerCase()===correctAnswers[k]) score++; });
                  const docD = { ...row, score, maxScore: maxTotalScore, percentage: Math.round((score/maxTotalScore)*100), timestamp: db?firebase.firestore.FieldValue.serverTimestamp():Date.now() };
                  if(!db) docD.id = 'imp-'+Date.now()+i;
                  newSubs.push(docD);
                }
                if(newSubs.length===0) return;
                if(db) {
                  const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');
                  for(const s of newSubs) await ref.add(s);
                  alert(t("✅ ນຳເຂົ້າສຳເລັດແລ້ວ!", "✅ Import successful!"));
                } else {
                  setSubmissions(p=>[...p,...newSubs]); alert(t("✅ ນຳເຂົ້າລົງເຄື່ອງສຳເລັດ!", "✅ Local Import successful!"));
                }
              } catch(e) { alert(t("❌ ເກີດຂໍ້ຜິດພາດໃນການອ່ານໄຟລ໌.", "❌ Error reading file.")); }
              e.target.value = null;
            };
            reader.readAsArrayBuffer(file);
          };

          const groupedSubmissions = Object.values(submissions.reduce((acc, sub) => {
            const c = sub._101; if (!c) return acc;
            if (!acc[c]) acc[c] = { code: c, pre: null, post: null, latestTime: 0 };
            if (sub.assessment_time === 'pre') acc[c].pre = sub; if (sub.assessment_time === 'post') acc[c].post = sub;
            acc[c].district = sub._104 || acc[c].district; acc[c].workplace = sub._105 || acc[c].workplace;
            return acc;
          }, {})).sort((a, b) => b.latestTime - a.latestTime);

          return (
            <React.Fragment>
              {!db && <div className="bg-yellow-500 text-white text-center py-2 px-4 text-sm font-bold shadow-md print:hidden flex items-center justify-center gap-2 font-noto"><Icon.AlertCircle className="w-5 h-5 shrink-0" /><span>{t('ໂໝດທົດລອງລະດັບທ້ອງຖິ່ນ (Local Mode)', 'Local Demo Mode')}</span></div>}

              {showAdminLogin && (
                <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative"><button onClick={()=>setShowAdminLogin(false)} className="absolute top-4 right-4 text-gray-400 hover:bg-gray-100 rounded-full p-1"><Icon.X className="w-5 h-5"/></button><h3 className="text-xl font-bold text-center mb-6">{t('ເຂົ້າສູ່ລະບົບ', 'Admin Login')}</h3><input type="password" placeholder="admin" value={adminPasswordInput} onChange={(e)=>setAdminPasswordInput(e.target.value)} className="w-full p-3 border rounded-lg mb-4 text-center" /><button onClick={handleAdminSubmit} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">{t('ຢືນຢັນ', 'Login')}</button></div>
                </div>
              )}

              {showNewFormModal && (
                <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-3xl w-full max-w-2xl p-6 relative flex flex-col"><button onClick={()=>setShowNewFormModal(false)} className="absolute top-4 right-4"><Icon.X className="w-5 h-5"/></button><h2 className="text-xl font-bold mb-4">{t('ສ້າງແບບຟອມໃໝ່', 'New Form')}</h2><textarea value={newFormText} onChange={e=>setNewFormText(e.target.value)} className="w-full h-48 p-4 border rounded-xl mb-4"/><button onClick={handleGenerateNewForm} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">{t('ສ້າງ', 'Generate')}</button></div>
                </div>
              )}

              {deleteConfirmId && (
                <div className="fixed inset-0 bg-gray-900/60 flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl text-center"><h3 className="text-xl font-bold mb-6">{t('ຍືນຍັນການລຶບ?', 'Confirm Delete?')}</h3><div className="flex gap-3"><button onClick={()=>setDeleteConfirmId(null)} className="flex-1 py-3 bg-gray-100 font-bold rounded-xl">{t('ຍົກເລີກ', 'Cancel')}</button><button onClick={confirmDelete} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl">{t('ລຶບ', 'Delete')}</button></div></div>
                </div>
              )}

              <div className={`font-noto bg-gray-100 ${isAdmin ? 'flex flex-row h-screen w-full' : 'flex flex-col min-h-screen'}`}>
                <div id="left-pane" className={`${isAdmin ? (isChartFullscreen?'hidden':'w-1/2 h-full overflow-y-auto bg-gray-50 border-r') : 'w-full max-w-3xl mx-auto py-6 sm:py-10 bg-transparent'} transition-all`}>
                  <div className={`p-4 sm:p-6 lg:p-8`}>
                    
                    {/* ປຸ່ມປ່ຽນພາສາສຳລັບໜ້າຟອມ (ຍ້າຍມາໄວ້ບ່ອນນີ້ເພື່ອບໍ່ໃຫ້ບັງປຸ່ມອື່ນ) */}
                    <div className="flex justify-end mb-3 print:hidden">
                      <div className="flex bg-white border border-gray-200 p-0.5 rounded-lg shadow-sm">
                        <button onClick={() => setLang('lo')} className={`flex items-center px-3 py-1.5 text-xs font-bold rounded-md transition-colors ${lang==='lo'?'bg-blue-600 text-white':'text-gray-500 hover:bg-gray-100'}`}><Icon.Globe className="w-3.5 h-3.5 mr-1" /> ລາວ</button>
                        <button onClick={() => setLang('en')} className={`flex items-center px-3 py-1.5 text-xs font-bold rounded-md transition-colors ${lang==='en'?'bg-blue-600 text-white':'text-gray-500 hover:bg-gray-100'}`}>EN</button>
                      </div>
                    </div>

                    {!showResultForm ? (
                      <React.Fragment>
                        <div className={`mb-6 p-5 rounded-2xl shadow-sm border text-center relative ${editId?'bg-yellow-50':'bg-white'}`}>
                          {!editId && (
                            <div className="absolute top-4 left-4 z-10 text-left">
                              <button onClick={() => setShowBlankFormDropdown(!showBlankFormDropdown)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 rounded-lg shadow-sm"><Icon.Printer className="w-4 h-4" /> {t('ໂຫຼດແບບຟອມ', 'Print Form')}</button>
                              {showBlankFormDropdown && <div className="fixed inset-0 z-10" onClick={()=>setShowBlankFormDropdown(false)}></div>}
                              {showBlankFormDropdown && (
                                <div className="absolute left-0 z-20 mt-1 w-40 bg-white shadow-lg ring-1 ring-black ring-opacity-5 rounded-lg border py-1">
                                  <button onClick={()=>{handleExportBlankFormWord();setShowBlankFormDropdown(false)}} className="flex items-center w-full px-4 py-2.5 text-xs hover:bg-gray-50">Word (.doc)</button>
                                  <button onClick={()=>{handleExportBlankFormPDF();setShowBlankFormDropdown(false)}} className="flex items-center w-full px-4 py-2.5 text-xs hover:bg-gray-50">PDF (.pdf)</button>
                                </div>
                              )}
                            </div>
                          )}
                          <button onClick={handleAdminToggleClick} className={`absolute top-4 right-4 p-2.5 rounded-full shadow-sm border transition-all z-10 ${isAdmin?'bg-blue-600 text-white border-blue-700':'bg-white text-gray-500 hover:text-blue-600'}`}>
                            {isAdmin ? <Icon.Unlock className="w-5 h-5"/> : <Icon.Lock className="w-5 h-5"/>}
                          </button>
                          <h1 className="text-xl md:text-2xl font-bold text-gray-800 mt-2">{editId ? t('ແກ້ໄຂຂໍ້ມູນ', 'Edit Mode') : t('ບົດທົດສອບ ກ່ອນ-ຫຼັງ LMG', 'LMG Pre-Post Assessment')}</h1>
                        </div>

                        <div className="space-y-6">
                          {surveyStructure.map((sec, sIdx) => (
                            <div key={sec.id} className="bg-white rounded-xl shadow-sm border overflow-hidden">
                              <div className="bg-gray-50/80 px-5 py-3 border-b flex items-center">{sec.icon} <h2 className="text-lg font-bold ml-2">{sec.title[lang]}</h2></div>
                              <div className="p-5">
                                {sec.questions.map((q, qIdx) => (
                                  <div key={q.name} id={`question-${q.name}`} className={`mb-5 last:mb-0 ${errors[q.name]?'bg-red-50 p-3 rounded-lg border border-red-200':''}`}>
                                    <label className="block font-medium mb-2 text-sm">{q.label[lang]} {q.required && <span className="text-red-500">*</span>}</label>
                                    {(q.type==='text'||q.type==='date') && <input type={q.type} className="w-full p-2.5 text-sm border rounded-lg focus:ring-2" value={formData[q.name]||''} onChange={e=>handleChange(q.name,e.target.value)} disabled={isSubmitting}/>}
                                    {q.type==='select_one' && <div className="space-y-2">{choices[q.choices].filter(c=>q.choice_filter?c.cf===q.choice_filter(formData):true).map(c=>(
                                      <label key={c.name} className={`flex items-start p-2.5 border rounded-lg cursor-pointer ${formData[q.name]===c.name?'bg-blue-50 border-blue-400':'hover:bg-gray-50'}`}><input type="radio" name={q.name} value={c.name} checked={formData[q.name]===c.name} onChange={e=>handleChange(q.name,e.target.value)} className="mt-0.5 w-4 h-4 text-blue-600"/><span className="ml-2.5 text-sm">{c.label[lang]}</span></label>
                                    ))}</div>}
                                    {errors[q.name] && <div className="text-red-600 text-xs mt-1.5 flex items-center"><Icon.AlertCircle className="w-3 h-3 mr-1"/>{errors[q.name]}</div>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>

                        <div className="mt-6 space-y-3">
                          {submitErrorMsg && <div className="p-4 bg-red-50 text-red-700 text-sm rounded-lg text-center">{submitErrorMsg}</div>}
                          <button onClick={handleSubmit} disabled={isSubmitting} className={`w-full py-4 text-white font-bold rounded-xl shadow-lg flex justify-center items-center ${isSubmitting?'bg-gray-400':(editId?'bg-yellow-500':'bg-blue-600 hover:bg-blue-700')}`}>
                            {isSubmitting ? t('ກຳລັງບັນທຶກ...', 'Saving...') : (editId ? t('ອັບເດດ', 'Update') : t('ສົ່ງຂໍ້ມູນ', 'Submit'))}
                          </button>
                          {editId && <button onClick={cancelEdit} className="w-full py-3 bg-gray-200 font-bold rounded-xl">{t('ຍົກເລີກ', 'Cancel')}</button>}
                        </div>
                      </React.Fragment>
                    ) : (
                      <div className="bg-white rounded-2xl shadow-lg p-8 mt-10 text-center">
                        <div className="inline-flex bg-green-100 rounded-full mb-4 p-4"><Icon.CheckCircle className="w-10 h-10 text-green-500" /></div>
                        <h2 className="text-2xl font-bold mb-2">{t('ສຳເລັດ!', 'Success!')}</h2>
                        <div className="bg-blue-50 p-6 rounded-xl mb-8 inline-block w-full max-w-xs"><p className="text-sm font-semibold mb-2">{t('ຄະແນນ', 'Score')}</p><div className="text-5xl font-bold text-blue-600">{recentScore?.total}/{recentScore?.max}</div></div>
                        <button onClick={startNewEntry} className="w-full py-4 bg-gray-800 text-white font-bold rounded-xl flex justify-center items-center"><Icon.RefreshCcw className="w-5 h-5 mr-2" /> {t('ກັບຄືນ', 'Back')}</button>
                      </div>
                    )}
                  </div>
                </div>

                {isAdmin && (
                  <div className={`${isChartFullscreen ? 'w-full' : 'w-1/2'} h-full overflow-y-auto bg-white z-10 shadow-[-10px_0_15px_-5px_rgba(0,0,0,0.05)]`}>
                    <div className={`p-4 sm:p-6 lg:p-8 ${isChartFullscreen?'max-w-7xl mx-auto':'min-w-[400px]'}`}>
                      <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4">
                        <div className="flex items-center gap-4">
                          <h2 className="text-xl font-bold flex items-center"><Icon.Database className="w-6 h-6 mr-2 text-blue-600"/> {t('ຂໍ້ມູນ', 'Data')}</h2>
                          
                          {/* ປຸ່ມປ່ຽນພາສາສຳລັບໜ້າ Admin (ຍ້າຍມາໄວ້ຂ້າງຂໍ້ຄວາມ ຂໍ້ມູນ) */}
                          <div className="flex bg-white border border-gray-200 p-0.5 rounded-lg shadow-sm print:hidden">
                            <button onClick={() => setLang('lo')} className={`flex items-center px-2 py-1 text-[11px] font-bold rounded-md transition-colors ${lang==='lo'?'bg-blue-600 text-white':'text-gray-500 hover:bg-gray-100'}`}><Icon.Globe className="w-3 h-3 mr-1" /> ລາວ</button>
                            <button onClick={() => setLang('en')} className={`flex items-center px-2 py-1 text-[11px] font-bold rounded-md transition-colors ${lang==='en'?'bg-blue-600 text-white':'text-gray-500 hover:bg-gray-100'}`}>EN</button>
                          </div>
                        </div>
                        <div className="flex flex-wrap gap-2 md:gap-3">
                          <button onClick={()=>setShowNewFormModal(true)} className="px-4 py-2 text-xs font-bold bg-indigo-50 text-indigo-700 rounded-lg border border-indigo-200">{t('ສ້າງແອັບໃໝ່', 'New App')}</button>
                          <div className="flex bg-white border p-1 rounded-lg">
                            <button onClick={()=>setChartFilter('all')} className={`px-4 py-1.5 text-xs font-bold rounded-md ${chartFilter==='all'?'bg-blue-600 text-white':''}`}>{t('ທັງໝົດ', 'All')}</button>
                            <button onClick={()=>setChartFilter('pre')} className={`px-4 py-1.5 text-xs font-bold rounded-md ${chartFilter==='pre'?'bg-[#35675D] text-white':'text-[#35675D]'}`}>Pre</button>
                            <button onClick={()=>setChartFilter('post')} className={`px-4 py-1.5 text-xs font-bold rounded-md ${chartFilter==='post'?'bg-[#BF5A38] text-white':'text-[#BF5A38]'}`}>Post</button>
                          </div>
                          <div className="relative">
                            <input type="file" id="fileImport" className="hidden" accept=".xlsx,.csv" onChange={e=>handleImportFile(e)}/>
                            <button onClick={()=>document.getElementById('fileImport').click()} className="px-3 py-1.5 text-xs font-bold text-blue-700 bg-blue-50 border rounded-lg flex items-center gap-1"><Icon.Upload className="w-3.5 h-3.5" /> {t('ນຳເຂົ້າ', 'Import')}</button>
                          </div>
                          <div className="relative">
                            <button onClick={()=>setShowExportDropdown(!showExportDropdown)} className="px-3 py-1.5 text-xs font-bold text-emerald-700 bg-emerald-50 border rounded-lg flex items-center gap-1"><Icon.Download className="w-3.5 h-3.5 text-emerald-600" /> {t('ສົ່ງອອກ', 'Export')}</button>
                            {showExportDropdown && <div className="fixed inset-0" onClick={()=>setShowExportDropdown(false)}></div>}
                            {showExportDropdown && (
                              <div className="absolute right-0 mt-1 w-40 bg-white border shadow-lg rounded-lg z-20 py-2">
                                <button onClick={()=>{handleExportExcel();setShowExportDropdown(false)}} className="w-full text-left px-4 py-2 text-xs hover:bg-gray-50">Excel</button>
                                <button onClick={()=>{handleExportWord();setShowExportDropdown(false)}} className="w-full text-left px-4 py-2 text-xs hover:bg-gray-50">Word</button>
                                <button onClick={()=>{handleExportPDF();setShowExportDropdown(false)}} className="w-full text-left px-4 py-2 text-xs hover:bg-gray-50">PDF</button>
                              </div>
                            )}
                          </div>
                          <button onClick={()=>setIsChartFullscreen(!isChartFullscreen)} className="p-2 border rounded-lg"><Icon.Maximize className="w-4 h-4"/></button>
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="p-4 rounded-xl border bg-[#35675D]/10"><p className="text-sm font-bold text-[#35675D]">{t('Pre-test', 'Pre-test')}</p><p className="text-2xl font-bold text-[#35675D]">{submissions.filter(s=>s.assessment_time==='pre').length}</p></div>
                        <div className="p-4 rounded-xl border bg-[#BF5A38]/10"><p className="text-sm font-bold text-[#BF5A38]">{t('Post-test', 'Post-test')}</p><p className="text-2xl font-bold text-[#BF5A38]">{submissions.filter(s=>s.assessment_time==='post').length}</p></div>
                      </div>

                      <div className="bg-white border rounded-2xl p-4 mb-8">
                        <h3 className="text-sm font-bold mb-4">{t('ຄະແນນລວມ', 'Scores')}</h3>
                        <ColumnChart data={filteredChartData} maxScore={maxTotalScore} isFullscreen={isChartFullscreen} lang={lang} />
                      </div>

                      <div className="bg-white border rounded-2xl p-4 mb-8">
                        <h3 className="text-sm font-bold mb-4">{t('ອັດຕາຕອບຖືກ', 'Correct Rate')}</h3>
                        <QuestionChart data={filteredChartData} correctAnswers={correctAnswers} surveyStructure={surveyStructure} isFullscreen={isChartFullscreen} lang={lang} />
                      </div>

                      <div className="bg-white border rounded-2xl p-4 mb-8">
                        <h3 className="text-sm font-bold text-red-600 mb-2 flex items-center"><Icon.AlertTriangle className="w-5 h-5 mr-2" />{t('ຄຳຖາມທີ່ຕອບຜິດຫຼາຍສຸດ', 'Lowest Correct Rate')}</h3>
                        <BottomThreeChart data={filteredChartData} correctAnswers={correctAnswers} surveyStructure={surveyStructure} lang={lang} />
                      </div>

                      <div className="bg-white border rounded-2xl overflow-hidden mb-8">
                        <div className="p-4 bg-gray-50 border-b"><h3 className="text-sm font-bold flex items-center"><Icon.List className="w-5 h-5 mr-2"/> {t('ຂໍ້ມູນທັງໝົດ', 'All Data')}</h3></div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-left min-w-[600px]">
                            <thead><tr className="bg-white border-b"><th className="p-3 text-xs">{t('ຊື່', 'Name')}</th><th className="p-3 text-xs text-center">Pre</th><th className="p-3 text-xs text-center">Post</th><th className="p-3 text-xs text-right">{t('ຈັດການ', 'Action')}</th></tr></thead>
                            <tbody>
                              {groupedSubmissions.map(g => (
                                <tr key={g.code} className="border-b">
                                  <td className="p-3 text-sm font-bold">{g.code}</td>
                                  <td className="p-3 text-center"><span className="text-[#35675D] font-bold">{g.pre?g.pre.score:'-'}</span></td>
                                  <td className="p-3 text-center"><span className="text-[#BF5A38] font-bold">{g.post?g.post.score:'-'}</span></td>
                                  <td className="p-3 text-right">
                                    {g.pre && <button onClick={()=>handleEditClick(g.pre)} className="p-1 mx-1 text-yellow-600"><Icon.Edit className="w-4 h-4"/></button>}
                                    {g.post && <button onClick={()=>handleEditClick(g.post)} className="p-1 mx-1 text-yellow-600"><Icon.Edit className="w-4 h-4"/></button>}
                                    {(g.pre||g.post) && <button onClick={()=>requestDelete((g.pre||g.post).id)} className="p-1 mx-1 text-red-500"><Icon.Trash className="w-4 h-4"/></button>}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
              <AIChatBox lang={lang} />
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
